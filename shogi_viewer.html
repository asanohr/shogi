<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>棋譜ビューア</title>
<style>
@container (max-width:600px){
  #layout-table[id] { display:block; width:100%; }
  [data-kse-row] { display:block; width:100%; }
  [data-r="boardCol"] { display:block; width:100%; text-align:center; }
  [data-r="movelistWrap"] { display:block !important; width:100% !important; box-sizing:border-box; padding:10px 0 0 0 !important; }
  [data-r="movelistWrap"] > div { height:235px !important; }
  #controls [data-r="mobileBreak"] { display:inline !important; }
  #controls button, #controls select { font-size:16px !important; padding:9px 14px !important; }
  #controls span[data-r="counter"] { display:inline-block !important; margin-top:10px !important; font-size:15px !important; }
}
</style>
</head>
<body style="margin:0;padding:0;background:#fff;">
<div id="app" style="font-family:'Hiragino Sans','Yu Gothic',sans-serif;color:#2b2118;padding:16px;container-type:inline-size;">
<div id="controls" style="margin-bottom:10px;font-size:13px;text-align:center;display:none;">
<button data-a="first" title="最初へ" style="background:#fff;border:1px solid #d8cdb8;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">|&lt;</button> 
<button data-a="prev" title="1手戻る" style="background:#fff;border:1px solid #d8cdb8;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">&lt;</button> 
<button data-a="stop" title="停止" style="background:#fff;border:1px solid #d8cdb8;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">■</button> 
<button data-a="next" title="1手進む" style="background:#fff;border:1px solid #d8cdb8;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">&gt;</button> 
<button data-a="last" title="最後へ" style="background:#fff;border:1px solid #d8cdb8;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">&gt;|</button> 
<br data-r="mobileBreak" style="display:none;">
<span data-r="counter" style="font-size:13px;min-width:80px;text-align:center;margin-right:1.5em;"></span> 
<button data-a="play" title="自動再生" style="background:#a33b2e;color:#fff;border:1px solid #a33b2e;border-radius:6px;padding:5px 9px;font-size:13px;cursor:pointer;">▶ 再生</button> 
<select data-r="speed" style="font-size:12px;">
<option value="1500">遅い</option><option value="800" selected>ふつう</option><option value="350">速い</option>
</select>
</div>
<div id="empty-msg" style="font-size:13px;color:#8a4a1c;">表示する棋譜データがありません。URLが正しいかご確認ください。</div>
<table id="layout-table" style="border-collapse:collapse;margin:0 auto;display:none;"><tr data-kse-row="1">
<td data-r="boardCol" valign="top" style="vertical-align:top;padding:0;text-align:center;">
<div data-r="mochiGote"></div>
<div data-r="boardArea"></div>
<div data-r="mochiSente"></div>
</td>
<td data-r="movelistWrap" valign="top" style="vertical-align:top;padding:0 0 0 8px;width:150px;display:none;">
<div style="height:390px;overflow-y:auto;border:1px solid #d8cdb8;border-radius:4px;">
<table style="width:100%;border-collapse:collapse;font-size:12px;">
<thead><tr>
<th style="background:#faf6ee;border-bottom:1px solid #d8cdb8;padding:3px 5px;font-size:11px;color:#5a4a34;text-align:center;width:28px;"></th>
<th style="background:#faf6ee;border-bottom:1px solid #d8cdb8;padding:3px 5px;font-size:11px;color:#5a4a34;text-align:center;">指し手</th>
</tr></thead>
<tbody data-r="moveBody"></tbody>
</table>
</div>
</td>
</tr></table>
</div>
<script>
(function(){
var KANJI = {FU:"歩",KY:"香",KE:"桂",GI:"銀",KI:"金",KA:"角",HI:"飛",OU:"玉",TO:"と",NY:"成香",NK:"成桂",NG:"成銀",UM:"馬",RY:"龍"};
var PROMOTED_TYPES = {TO:1,NY:1,NK:1,NG:1,UM:1,RY:1};
var STACKED_TYPES = {NY:1,NK:1,NG:1};
var HAND_ORDER = ["HI","KA","KI","GI","KE","KY","FU"];
var ZEN = "０１２３４５６７８９";
var KAN = "一二三四五六七八九";
var CELL_CSS = "border:1px solid #6b4d24;text-align:center;vertical-align:middle;font-size:22px;user-select:none;box-sizing:border-box;width:38px;height:38px;background:#dcb35c;padding:0;";
var LABEL_CSS = "text-align:center;vertical-align:middle;font-size:14px;color:#5a4a34;box-sizing:border-box;padding:0;border:none;background:#dcb35c;";
var KOMA_W = 30, KOMA_H = 34;
var KOMA_CLIP = "polygon(50% 0%,96% 22%,100% 100%,0% 100%,4% 22%)";
function kanjiNum(n){ if (n<=0) return ""; if (n<=9) return KAN[n-1]; if (n<20) return n===10 ? "十" : ("十" + KAN[n-11]); return String(n); }
function buildKomaShape(w, h){
  var wrap = document.createElement("div");
  wrap.setAttribute("style", "position:relative;width:" + w + "px;height:" + h + "px;box-sizing:border-box;");
  var border = document.createElement("div");
  border.setAttribute("style", "position:absolute;inset:0;background:#8a5a2b;clip-path:" + KOMA_CLIP + ";");
  var inner = document.createElement("div");
  inner.setAttribute("style", "position:absolute;inset:1.5px;background:#f3ddaa;clip-path:" + KOMA_CLIP + ";box-sizing:border-box;padding-top:4px;display:flex;align-items:center;justify-content:center;");
  wrap.appendChild(border);
  wrap.appendChild(inner);
  return { wrap: wrap, inner: inner };
}
function fillKomaContent(inner, type, emphasis, promoted){
  var color = promoted ? "#a33b2e" : "#1a1208";
  var textCss = "font-weight:900;line-height:1;color:" + color + ";-webkit-text-stroke:0.4px " + color + ";" + (emphasis ? "font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;" : "font-family:'Yu Mincho','Hiragino Mincho ProN',serif;");
  var label = KANJI[type];
  if (STACKED_TYPES[type]) {
    var col = document.createElement("div");
    col.setAttribute("style", "display:flex;flex-direction:column;align-items:center;line-height:.95;");
    var stackedFontSize = emphasis ? "15px" : "12px";
    label.split("").forEach(function(ch){ var line = document.createElement("span"); line.textContent = ch; line.setAttribute("style", textCss + "font-size:" + stackedFontSize + ";transform:scaleX(1.3);"); col.appendChild(line); });
    inner.appendChild(col);
  } else {
    var span = document.createElement("span");
    span.setAttribute("style", textCss + "font-size:" + (emphasis ? "22px" : "19px") + ";");
    span.textContent = label;
    inner.appendChild(span);
  }
}
function buildBoardSkeleton(boardAreaEl, crop){
  crop = crop || { x: 0, y: 0, w: 1, h: 1 };
  var CELL = 38, LABEL_TOP = 13, LABEL_RIGHT = 16;
  var fullW = CELL * 9 + LABEL_RIGHT, fullH = LABEL_TOP + CELL * 9;
  var viewW = crop.w * fullW, viewH = crop.h * fullH;
  var offX = crop.x * fullW, offY = crop.y * fullH;
  boardAreaEl.innerHTML = "";
  boardAreaEl.setAttribute("style", "display:inline-block;background:#dcb35c;padding:0 0 6px 6px;position:relative;overflow:hidden;width:" + (viewW + 6) + "px;height:" + viewH + "px;");
  var inner = document.createElement("div");
  inner.setAttribute("style", "position:absolute;left:" + (6 - offX) + "px;top:" + (-offY) + "px;width:" + fullW + "px;height:" + fullH + "px;");
  for (var k = 0; k < 9; k++) {
    var f = 9 - k;
    var lbl = document.createElement("div");
    lbl.textContent = ZEN[f];
    lbl.setAttribute("style", LABEL_CSS + "position:absolute;left:" + (k * CELL) + "px;top:0;width:" + CELL + "px;height:" + LABEL_TOP + "px;display:flex;align-items:center;justify-content:center;");
    inner.appendChild(lbl);
  }
  for (var j = 0; j < 9; j++) {
    var r = j + 1;
    var rl = document.createElement("div");
    rl.textContent = KAN[r - 1];
    rl.setAttribute("style", LABEL_CSS + "position:absolute;left:" + (9 * CELL) + "px;top:" + (LABEL_TOP + j * CELL) + "px;width:" + LABEL_RIGHT + "px;height:" + CELL + "px;display:flex;align-items:center;justify-content:center;");
    inner.appendChild(rl);
  }
  var cellEls = {};
  var table = document.createElement("table");
  table.setAttribute("style", "border-collapse:collapse;background:#dcb35c;position:absolute;left:0;top:" + LABEL_TOP + "px;");
  table.setAttribute("cellpadding", "0");
  table.setAttribute("cellspacing", "0");
  for (var rank = 1; rank <= 9; rank++) {
    var tr = document.createElement("tr");
    for (var file = 9; file >= 1; file--) {
      var cell = document.createElement("td");
      cell.className = "kse-cell";
      cell.setAttribute("style", CELL_CSS);
      tr.appendChild(cell);
      cellEls[file + "," + rank] = cell;
    }
    table.appendChild(tr);
  }
  inner.appendChild(table);
  boardAreaEl.appendChild(inner);
  return cellEls;
}
function paintBoardInto(cellEls, boardMap){
  for (var key in cellEls) { cellEls[key].innerHTML = ""; cellEls[key].setAttribute("style", CELL_CSS); }
  for (var k2 in boardMap) {
    var p = boardMap[k2]; var cell = cellEls[k2]; if (!cell) continue;
    var km = buildKomaShape(KOMA_W, KOMA_H);
    km.wrap.style.margin = "0 auto";
    if (p.owner === "w") km.wrap.style.transform = "rotate(180deg)";
    fillKomaContent(km.inner, p.type, p.emphasis, !!PROMOTED_TYPES[p.type]);
    cell.appendChild(km.wrap);
  }
}
function highlightCell(cellEls, key){ if (cellEls[key]) cellEls[key].style.background = "#ff9800"; }
function renderMochiRowInto(container, hand, name, fallback, flip){
  container.innerHTML = "";
  container.setAttribute("style", "text-align:center;box-sizing:border-box;padding:" + (flip ? "0 0 6px 0" : "6px 0 0 0") + ";");
  var inner = document.createElement("div");
  var css = "display:inline-flex;align-items:center;font-weight:bold;font-size:16px;white-space:nowrap;";
  if (flip) css += "transform:rotate(180deg);";
  inner.setAttribute("style", css);
  var nameSpan = document.createElement("span");
  nameSpan.textContent = name || fallback;
  nameSpan.style.marginRight = "6px";
  inner.appendChild(nameSpan);
  var mw = KOMA_W - 6, mh = KOMA_H - 6;
  HAND_ORDER.forEach(function(type){
    var n = hand[type] || 0;
    for (var i = 0; i < n; i++) {
      var km = buildKomaShape(mw, mh);
      km.wrap.style.display = "inline-block";
      km.wrap.style.verticalAlign = "middle";
      km.wrap.style.margin = "0 2px";
      fillKomaContent(km.inner, type, false, false);
      inner.appendChild(km.wrap);
    }
  });
  container.appendChild(inner);
}
function buildMoveRowsInto(tbody, notations, currentIdx, onClick){
  tbody.innerHTML = "";
  var numCss = "padding:2px 6px;border-bottom:1px solid #efe8d8;color:#a89b86;text-align:right;cursor:default;width:28px;";
  var cellEls = [];
  for (var i = 0; i < notations.length; i++) {
    var tr = document.createElement("tr");
    var numTd = document.createElement("td"); numTd.textContent = (i + 1); numTd.setAttribute("style", numCss); tr.appendChild(numTd);
    var td = document.createElement("td");
    td.setAttribute("style", "padding:2px 6px;cursor:pointer;border-bottom:1px solid #efe8d8;" + (i === currentIdx ? "background:#fff3a0;font-weight:bold;" : ""));
    td.textContent = notations[i];
    (function(idx, cell){ if (onClick) cell.addEventListener("click", function(){ onClick(idx); }); cellEls[idx] = cell; })(i, td);
    tr.appendChild(td);
    tbody.appendChild(tr);
  }
  return cellEls;
}
var DEMOTE = {TO:"FU",NY:"KY",NK:"KE",NG:"GI",UM:"KA",RY:"HI"};
function baseTypeOf(t){ return DEMOTE[t] || t; }
function cloneMap(m){ var o = {}; for (var k in m) o[k] = m[k]; return o; }
function cloneHands(h){ return { b: cloneMap(h.b), w: cloneMap(h.w) }; }
function notationForCompact(mv, prevTo){
  var mark = mv.color === "b" ? "▲" : "△";
  var same = prevTo && prevTo.file === mv.to.file && prevTo.rank === mv.to.rank;
  var s = same
    ? (mark + "同　" + KANJI[mv.baseType])
    : (mark + (ZEN[mv.to.file] || mv.to.file) + (KAN[mv.to.rank - 1] || mv.to.rank) + KANJI[mv.baseType]);
  if (mv.drop) s += "打";
  if (mv.promoted) s += "成";
  return s;
}
function applyRecordToState(state, mv){
  if (mv.drop) {
    state.hands[mv.color][mv.baseType] -= 1;
    if (state.hands[mv.color][mv.baseType] <= 0) delete state.hands[mv.color][mv.baseType];
  } else if (mv.from) {
    delete state.board[mv.from.file + "," + mv.from.rank];
  }
  if (mv.captured) {
    var bt = baseTypeOf(mv.captured.type);
    state.hands[mv.color][bt] = (state.hands[mv.color][bt] || 0) + 1;
  }
  state.board[mv.to.file + "," + mv.to.rank] = { type: mv.type, owner: mv.color };
}
function expandPayload(payload){
  var state = { board: cloneMap(payload.initial.board), hands: cloneHands(payload.initial.hands) };
  var snapshots = [{ board: cloneMap(state.board), hands: cloneHands(state.hands) }];
  var notations = []; var tos = []; var prevTo = null;
  (payload.moves || []).forEach(function(mv){
    applyRecordToState(state, mv);
    notations.push(notationForCompact(mv, prevTo));
    tos.push(mv.to);
    prevTo = mv.to;
    snapshots.push({ board: cloneMap(state.board), hands: cloneHands(state.hands) });
  });
  return { snapshots: snapshots, notations: notations, tos: tos, names: payload.names, hasMoves: (payload.moves || []).length > 0, crop: payload.crop || null, mochiPos: payload.mochiPos || null };
}
function decodeHashPayload(){
  var m = (location.hash || "").match(/^#d=(.+)$/);
  if (!m) return null;
  try { return JSON.parse(decodeURIComponent(m[1])); } catch (e) { return null; }
}
function q(sel){ return document.querySelector(sel); }
function rEl(name){ return q('[data-r="' + name + '"]'); }
function aEl(name){ return q('[data-a="' + name + '"]'); }
var boardAreaEl = rEl("boardArea");
var mochiGoteEl = rEl("mochiGote");
var mochiSenteEl = rEl("mochiSente");
var counterEl = rEl("counter");
var moveBodyEl = rEl("moveBody");
var speedSelect = rEl("speed");
var cellEls = null;
var DATA = null;
var currentIndex = 0;
var playTimer = null;
function render(){
  var snap = DATA.snapshots[currentIndex];
  paintBoardInto(cellEls, snap.board);
  if (currentIndex > 0 && DATA.tos && DATA.tos[currentIndex - 1]) { var lastTo = DATA.tos[currentIndex - 1]; highlightCell(cellEls, lastTo.file + "," + lastTo.rank); }
  renderMochiRowInto(mochiGoteEl, snap.hands.w, DATA.names && DATA.names.w, "後手", true);
  renderMochiRowInto(mochiSenteEl, snap.hands.b, DATA.names && DATA.names.b, "先手", false);
  applyMochiOffset(mochiGoteEl, DATA.mochiPos && DATA.mochiPos.w);
  applyMochiOffset(mochiSenteEl, DATA.mochiPos && DATA.mochiPos.b);
  buildMoveRowsInto(moveBodyEl, DATA.notations, currentIndex - 1, function(idx){ stopPlay(); currentIndex = idx + 1; render(); });
  counterEl.textContent = currentIndex + " / " + (DATA.snapshots.length - 1) + " 手";
  updateButtons();
}
function applyMochiOffset(el, offset){ if (!offset) return; el.style.position = "relative"; el.style.transform = "translate(" + ((offset.dx || 0) * 38) + "px," + ((offset.dy || 0) * 38) + "px)"; }
function updateButtons(){
  var last = DATA.snapshots.length - 1;
  aEl("first").disabled = currentIndex === 0;
  aEl("prev").disabled = currentIndex === 0;
  aEl("next").disabled = currentIndex >= last;
  aEl("last").disabled = currentIndex >= last;
  aEl("play").disabled = last <= 0;
  aEl("stop").disabled = !playTimer;
}
function stopPlay(){ if (playTimer) { clearInterval(playTimer); playTimer = null; updateButtons(); } }
function startPlay(){
  if (playTimer) return;
  var last = DATA.snapshots.length - 1;
  if (currentIndex >= last) currentIndex = 0;
  var speed = parseInt(speedSelect.value, 10);
  playTimer = setInterval(function(){
    var last2 = DATA.snapshots.length - 1;
    if (currentIndex >= last2) { stopPlay(); return; }
    currentIndex++; render();
  }, speed);
  updateButtons();
}
aEl("first").addEventListener("click", function(){ stopPlay(); currentIndex = 0; render(); });
aEl("prev").addEventListener("click", function(){ stopPlay(); if (currentIndex > 0) currentIndex--; render(); });
aEl("next").addEventListener("click", function(){ stopPlay(); var last = DATA.snapshots.length - 1; if (currentIndex < last) currentIndex++; render(); });
aEl("last").addEventListener("click", function(){ stopPlay(); currentIndex = DATA.snapshots.length - 1; render(); });
aEl("stop").addEventListener("click", stopPlay);
aEl("play").addEventListener("click", startPlay);
var emptyMsg = document.getElementById("empty-msg");
var layoutTable = document.getElementById("layout-table");
function showEmpty(msg){ if (msg) emptyMsg.textContent = msg; emptyMsg.style.display = ""; layoutTable.style.display = "none"; document.getElementById("controls").style.display = "none"; }
function showPayload(payload){
  stopPlay();
  emptyMsg.style.display = "none";
  layoutTable.style.display = "";
  DATA = expandPayload(payload);
  cellEls = buildBoardSkeleton(boardAreaEl, DATA.crop);
  currentIndex = 0;
  document.getElementById("controls").style.display = DATA.hasMoves ? "" : "none";
  rEl("movelistWrap").style.display = DATA.hasMoves ? "" : "none";
  render();
}
function boot(){
  stopPlay();
  var payload = decodeHashPayload();
  if (payload) { showPayload(payload); return; }
  var src = null;
  try { src = new URLSearchParams(location.search).get("src"); } catch (e) {}
  if (!src) { showEmpty("表示する棋譜データがありません。URLが正しいかご確認ください。"); return; }
  showEmpty("読み込み中…");
  var bust = src + (src.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
  fetch(bust).then(function(res){
    if (!res.ok) throw new Error("http " + res.status);
    return res.json();
  }).then(showPayload).catch(function(){
    showEmpty("棋譜データの読み込みに失敗しました。URLが正しいかご確認ください。");
  });
}
window.addEventListener("hashchange", boot);
boot();
var __appEl = document.getElementById("app");
function __reportHeight(){ try { window.parent.postMessage({ type: "shogiKifuHeight", height: __appEl.scrollHeight }, "*"); } catch (e) {} }
if (window.ResizeObserver) { new ResizeObserver(__reportHeight).observe(__appEl); } else { window.addEventListener("resize", __reportHeight); setInterval(__reportHeight, 500); }
})();
</script>
</body>
</html>
